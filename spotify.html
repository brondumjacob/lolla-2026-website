<style>
/* === LINEUP PAGE STYLES === */
.lineup-section {
  position: relative;
  padding: 60px 32px 120px;
  max-width: 1400px;
  margin: 0 auto;
}

.section-header-bar {
  background: var(--magenta);
  transform: skewX(-3deg);
  display: inline-block;
  padding: 8px 28px;
  margin-bottom: 40px;
}

.section-header-bar span {
  font-family: 'Anton', sans-serif;
  font-size: clamp(36px, 6vw, 80px);
  color: var(--yellow);
  display: inline-block;
  transform: skewX(3deg);
  letter-spacing: -1px;
}

.side-label {
  display: none;
  position: absolute;
  left: -48px;
  top: 240px;
  font-family: 'Anton', sans-serif;
  font-size: 72px;
  color: rgba(255, 238, 0, 0.08);
  transform: rotate(-90deg);
  transform-origin: left center;
  white-space: nowrap;
  pointer-events: none;
  user-select: none;
  letter-spacing: -2px;
}

@media (min-width: 1200px) { .side-label { display: block; } }

/* === CONTROLS === */
.controls-block {
  margin-bottom: 32px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.platform-row { display: flex; gap: 6px; }

.lineup-platform-btn {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 24px;
  font-family: 'Anton', sans-serif;
  font-size: 16px;
  letter-spacing: 1px;
  border: 2px solid var(--yellow);
  cursor: pointer;
  transition: background 0.1s, color 0.1s;
  border-radius: 4px;
}

.lineup-platform-btn.inactive {
  background: var(--black);
  color: var(--yellow);
}

.lineup-platform-btn.active-sp {
  background: var(--sp);
  color: var(--black);
  border-color: var(--sp);
}

.lineup-platform-btn.active-am {
  background: var(--am);
  color: var(--white);
  border-color: var(--am);
}

.search-input {
  width: 100%;
  max-width: 480px;
  padding: 12px 16px;
  background: var(--black);
  border: 2px solid var(--yellow);
  color: var(--yellow);
  font-family: 'Space Mono', monospace;
  font-size: 14px;
  letter-spacing: 1px;
  outline: none;
  transition: border-color 0.15s;
  border-radius: 4px;
}

.search-input::placeholder { color: rgba(255, 238, 0, 0.35); }
.search-input:focus { border-color: var(--white); }

.tier-row { display: flex; gap: 6px; flex-wrap: wrap; }

.tier-btn {
  padding: 8px 20px;
  font-family: 'Anton', sans-serif;
  font-size: 14px;
  letter-spacing: 1px;
  border: 2px solid var(--yellow);
  cursor: pointer;
  transition: background 0.1s, color 0.1s;
  margin-bottom: 4px;
  border-radius: 4px;
}

.tier-btn.inactive { background: var(--black); color: var(--yellow); }
.tier-btn.active { background: var(--yellow); color: var(--black); }

.genre-row { display: flex; gap: 6px; flex-wrap: wrap; }

.genre-chip {
  padding: 5px 12px;
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  letter-spacing: 1px;
  text-transform: uppercase;
  border: 1px solid currentColor;
  cursor: pointer;
  transition: background 0.1s, color 0.1s;
  background: transparent;
  border-radius: 3px;
}

/* genre-chip active colors are set inline via React for per-genre colors */

.result-count {
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  color: rgba(255, 255, 255, 0.35);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 16px;
  margin-top: -4px;
}

/* === TIER LABELS === */
.tier-label {
  font-family: 'Anton', sans-serif;
  font-size: 13px;
  letter-spacing: 4px;
  text-transform: uppercase;
  margin-bottom: 14px;
  margin-top: 40px;
  display: flex;
  align-items: center;
  gap: 12px;
}

.tier-label-dot {
  display: inline-block;
  width: 10px;
  height: 10px;
  border-radius: 50%;
}

.tier-label:first-child { margin-top: 0; }

/* === HEADLINER GRID === */
.hl-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 10px;
  margin-bottom: 0;
}

.hl-card {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 22px 20px;
  background: var(--black);
  border: 3px solid var(--yellow);
  text-decoration: none;
  color: inherit;
  cursor: pointer;
  transition: box-shadow 0.12s, transform 0.12s;
  opacity: 0;
  transform: translateY(8px);
  border-radius: 6px;
}

.hl-card.vis {
  opacity: 1;
  transform: translateY(0);
  transition: opacity 0.3s ease, transform 0.3s ease, box-shadow 0.12s;
}

.hl-card:hover {
  box-shadow: 6px 6px 0 var(--magenta);
  transform: translate(-3px, -3px);
}

.hl-name {
  font-family: 'Anton', sans-serif;
  font-size: 20px;
  color: var(--yellow);
  letter-spacing: 0.5px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 180px;
}

.hl-genre {
  font-family: 'Space Mono', monospace;
  font-size: 9px;
  color: var(--magenta);
  text-transform: uppercase;
  letter-spacing: 2px;
  margin-top: 4px;
}

.mj-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 8px;
}

.mj-card {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 16px;
  background: var(--black);
  border: 2px solid transparent;
  text-decoration: none;
  color: inherit;
  cursor: pointer;
  transition: box-shadow 0.12s, transform 0.12s, border-color 0.12s;
  opacity: 0;
  transform: translateY(8px);
  border-radius: 5px;
}

.mj-card.vis {
  opacity: 1;
  transform: translateY(0);
  transition: opacity 0.3s ease, transform 0.3s ease, box-shadow 0.12s, border-color 0.12s;
}

.mj-name {
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 700;
  font-size: 15px;
  color: var(--white);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 160px;
}

.mj-genre {
  font-family: 'Space Mono', monospace;
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  margin-top: 4px;
}

/* === UNDERCARD LIST === */
.uc-list { display: flex; flex-direction: column; }

.uc-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 11px 8px;
  border-bottom: 1px solid rgba(255, 238, 0, 0.12);
  text-decoration: none;
  color: inherit;
  cursor: pointer;
  transition: background 0.1s;
  opacity: 0;
  transform: translateY(4px);
  border-radius: 3px;
}

.uc-row.vis {
  opacity: 1;
  transform: translateY(0);
  transition: opacity 0.25s ease, transform 0.25s ease, background 0.1s;
}

.uc-row:hover { background: rgba(255, 238, 0, 0.04); }

.uc-left {
  display: flex;
  align-items: center;
  gap: 14px;
  min-width: 0;
}

.uc-name {
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 600;
  font-size: 14px;
  color: var(--white);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.uc-genre {
  font-family: 'Space Mono', monospace;
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  flex-shrink: 0;
}

.uc-link {
  font-family: 'Space Mono', monospace;
  font-size: 8px;
  letter-spacing: 1px;
  opacity: 0.4;
  flex-shrink: 0;
  margin-left: 8px;
}

.card-link-icon { flex-shrink: 0; margin-left: 12px; opacity: 0.7; }

/* === EMPTY STATE === */
.empty-state {
  text-align: center;
  padding: 80px 20px;
  font-family: 'Anton', sans-serif;
  font-size: 32px;
  color: rgba(255, 238, 0, 0.2);
  letter-spacing: 2px;
}

/* === RESPONSIVE === */
@media (max-width: 768px) {
  .lineup-section { padding: 40px 16px 80px; }
  .hl-grid { grid-template-columns: 1fr 1fr; }
  .hl-name { font-size: 16px; max-width: 130px; }
  .mj-grid { grid-template-columns: 1fr 1fr; }
  .controls-block { gap: 10px; }
}

@media (max-width: 480px) {
  .hl-grid { grid-template-columns: 1fr; }
  .mj-grid { grid-template-columns: 1fr; }
}

@media (prefers-reduced-motion: reduce) {
  .hl-card, .mj-card, .uc-row,
  .hl-card.vis, .mj-card.vis, .uc-row.vis {
    opacity: 1; transform: none; transition: none;
  }
  .hl-card:hover { transform: none; box-shadow: none; }
}

    headliners.length > 0 ? e("div", null,
      e("div", { className: "tier-label" },
        e("span", { className: "tier-label-dot", style: { background: "#FFEE00" } }),
        e("span", { style: { color: "#FFEE00" } }, "HEADLINERS")
      ),
      e("div", { className: "hl-grid" },
        headliners.map(function(a) { return e(HlCard, { key: a.n, a: a, platform: platform }); })
      )
    ) : null,

    e("div", { className: "ad-slot" }),

    majors.length > 0 ? e("div", null,
      e("div", { className: "tier-label" },
        e("span", { className: "tier-label-dot", style: { background: "#00FF88" } }),
        e("span", { style: { color: "#00FF88" } }, "MAJOR ACTS")
      ),
      e("div", { className: "mj-grid" },
        majors.map(function(a) { return e(MjCard, { key: a.n, a: a, platform: platform }); })
      )
    ) : null,

    e("div", { className: "ad-slot" }),

    undercards.length > 0 ? e("div", null,
      e("div", { className: "tier-label" },
        e("span", { className: "tier-label-dot", style: { background: "rgba(255,255,255,0.3)" } }),
        e("span", { style: { color: "rgba(255,255,255,0.5)" } }, "UNDERCARD")
      ),
      e("div", { className: "uc-list" },
        undercards.map(function(a) { return e(UcRow, { key: a.n, a: a, platform: platform }); })
      )
    ) : null,

    filtered.length === 0 ? e("div", { className: "empty-state" }, "NO ARTISTS FOUND") : null
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(e(App));
</script>
</body>
</html>
