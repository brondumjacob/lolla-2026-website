<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Option B — Neon Bento</title>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --yellow: #FFEE00;
  --magenta: #FF3366;
  --green: #00FF88;
  --indigo: #4400FF;
  --black: #000000;
  --white: #FFFFFF;
  --sp: #1DB954;
  --am: #FC3C44;
  --yt: #FF0000;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #080808;
  color: var(--white);
  font-family: 'Space Grotesk', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* GENRE COLOR MAP */
.gc-pop       { --gc: #FF3366; }
.gc-rock      { --gc: #00FF88; }
.gc-edm       { --gc: #8866FF; }
.gc-electronic{ --gc: #6655EE; }
.gc-hiphop    { --gc: #FFEE00; }
.gc-rb        { --gc: #FF8833; }
.gc-indie     { --gc: #BB99FF; }
.gc-kpop      { --gc: #FF66BB; }
.gc-altpop    { --gc: #00CCFF; }
.gc-jpop      { --gc: #FF7755; }
.gc-soulpop   { --gc: #FFB400; }
.gc-country   { --gc: #CCAA55; }
.gc-folk      { --gc: #88CC66; }
.gc-various   { --gc: #888888; }
.gc-classical { --gc: #CCCCCC; }

/* NAV */
.controls {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(8,8,8,0.95);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(255,255,255,0.06);
  padding: 10px 24px;
}
.controls-inner {
  max-width: 1000px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}
.platform-pills {
  display: flex;
  gap: 4px;
}
.pill {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 1px;
  padding: 7px 16px;
  border-radius: 100px;
  border: 1px solid rgba(255,255,255,0.15);
  background: transparent;
  color: rgba(255,255,255,0.4);
  cursor: pointer;
  transition: all 0.15s;
}
.pill:hover { border-color: rgba(255,255,255,0.4); color: var(--white); }
.pill.active-sp { border-color: var(--sp); color: var(--sp); background: rgba(29,185,84,0.08); }
.pill.active-am { border-color: var(--am); color: var(--am); background: rgba(252,60,68,0.08); }
.pill.active-yt { border-color: var(--yt); color: var(--yt); background: rgba(255,0,0,0.08); }

.search-input {
  flex: 1;
  min-width: 140px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 100px;
  color: var(--white);
  font-family: 'Space Grotesk', sans-serif;
  font-size: 13px;
  padding: 7px 16px;
  outline: none;
  transition: border-color 0.15s;
}
.search-input::placeholder { color: rgba(255,255,255,0.25); }
.search-input:focus { border-color: var(--yellow); }

.day-filters {
  display: flex;
  gap: 4px;
}
.day-pill {
  font-size: 11px;
  font-weight: 600;
  padding: 5px 12px;
  border-radius: 100px;
  border: 1px solid rgba(255,255,255,0.1);
  background: transparent;
  color: rgba(255,255,255,0.35);
  cursor: pointer;
  transition: all 0.15s;
}
.day-pill:hover { border-color: rgba(255,255,255,0.3); color: var(--white); }
.day-pill.active { background: var(--yellow); border-color: var(--yellow); color: var(--black); }

/* HERO */
.hero {
  max-width: 1000px;
  margin: 0 auto;
  padding: 48px 24px 36px;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 24px;
}
@media (max-width: 600px) { .hero { flex-direction: column; align-items: flex-start; } }
.hero-left {}
.hero-title {
  font-family: 'Anton', sans-serif;
  font-size: clamp(42px, 9vw, 100px);
  background: linear-gradient(135deg, var(--yellow), var(--magenta), var(--green), #A855F7);
  background-size: 300% 300%;
  animation: gr 6s ease infinite;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  line-height: 0.9;
  letter-spacing: -2px;
  text-transform: uppercase;
}
@keyframes gr {
  0%   { background-position: 0% 50%; }
  50%  { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}
.hero-sub {
  font-size: 12px;
  letter-spacing: 3px;
  color: rgba(255,255,255,0.3);
  text-transform: uppercase;
  margin-top: 12px;
}
.result-count {
  font-size: 12px;
  letter-spacing: 1px;
  color: rgba(255,255,255,0.25);
  text-align: right;
}

/* LINEUP */
.lineup {
  max-width: 1000px;
  margin: 0 auto;
  padding: 0 24px 80px;
}

.tier-label {
  font-family: 'Anton', sans-serif;
  font-size: 10px;
  letter-spacing: 5px;
  color: rgba(255,255,255,0.2);
  text-transform: uppercase;
  margin: 40px 0 16px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.tier-label::after { content: ''; flex: 1; height: 1px; background: rgba(255,255,255,0.06); }

/* HEADLINERS — 2-col bento cards */
.hl-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px;
}
@media (max-width: 500px) { .hl-grid { grid-template-columns: 1fr; } }
.hl-card {
  position: relative;
  padding: 32px 28px;
  min-height: 160px;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  text-decoration: none;
  overflow: hidden;
  border-radius: 4px;
  transition: transform 0.2s, filter 0.2s;
  background: linear-gradient(135deg, rgba(0,0,0,0.4), rgba(0,0,0,0.2)),
              linear-gradient(135deg, color-mix(in srgb, var(--gc) 25%, transparent), color-mix(in srgb, var(--gc) 5%, transparent));
  border: 1px solid color-mix(in srgb, var(--gc) 30%, transparent);
}
.hl-card::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(to top, rgba(0,0,0,0.6) 0%, transparent 60%);
}
.hl-card:hover { transform: translateY(-2px); filter: brightness(1.1); }
.hl-name {
  font-family: 'Anton', sans-serif;
  font-size: clamp(24px, 4vw, 42px);
  color: var(--white);
  text-transform: uppercase;
  line-height: 1;
  position: relative;
  z-index: 1;
}
.hl-meta {
  font-size: 11px;
  letter-spacing: 2px;
  color: var(--gc);
  text-transform: uppercase;
  margin-top: 6px;
  position: relative;
  z-index: 1;
  opacity: 0.9;
}
.hl-icon {
  position: absolute;
  top: 20px;
  right: 20px;
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: rgba(255,255,255,0.1);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1;
}

/* MAJORS — 3-col cards */
.mj-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 6px;
}
@media (max-width: 640px) { .mj-grid { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 380px) { .mj-grid { grid-template-columns: 1fr; } }
.mj-card {
  padding: 20px 16px;
  text-decoration: none;
  border-radius: 4px;
  border: 1px solid color-mix(in srgb, var(--gc) 20%, rgba(255,255,255,0.05));
  background: color-mix(in srgb, var(--gc) 4%, rgba(255,255,255,0.02));
  text-align: center;
  transition: all 0.15s;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
}
.mj-card:hover {
  border-color: color-mix(in srgb, var(--gc) 60%, transparent);
  background: color-mix(in srgb, var(--gc) 10%, rgba(0,0,0,0));
  transform: translateY(-1px);
}
.mj-name {
  font-family: 'Anton', sans-serif;
  font-size: clamp(14px, 2.5vw, 20px);
  color: var(--white);
  text-transform: uppercase;
  line-height: 1.1;
}
.mj-genre-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--gc);
}
.mj-meta {
  font-size: 10px;
  letter-spacing: 1.5px;
  color: rgba(255,255,255,0.3);
  text-transform: uppercase;
}

/* UNDERCARDS — 4-col compact */
.uc-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 4px;
}
@media (max-width: 700px) { .uc-grid { grid-template-columns: repeat(3, 1fr); } }
@media (max-width: 480px) { .uc-grid { grid-template-columns: repeat(2, 1fr); } }
.uc-card {
  padding: 12px 10px;
  text-decoration: none;
  border-radius: 4px;
  background: rgba(255,255,255,0.025);
  border: 1px solid rgba(255,255,255,0.05);
  text-align: center;
  transition: all 0.15s;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 5px;
}
.uc-card:hover {
  background: rgba(255,255,255,0.06);
  border-color: var(--gc);
}
.uc-dot {
  width: 4px;
  height: 4px;
  border-radius: 50%;
  background: var(--gc);
}
.uc-name {
  font-size: 11px;
  font-weight: 600;
  color: rgba(255,255,255,0.7);
  line-height: 1.2;
}

/* OPTION BADGE */
.option-badge {
  position: fixed;
  bottom: 20px;
  right: 20px;
  font-family: 'Anton', sans-serif;
  font-size: 11px;
  letter-spacing: 2px;
  background: var(--yellow);
  color: var(--black);
  padding: 8px 16px;
  z-index: 999;
  border-radius: 2px;
}
</style>
</head>
<body>

<div class="option-badge">OPTION B — NEON BENTO</div>

<div class="controls">
  <div class="controls-inner">
    <div class="platform-pills">
      <button class="pill active-sp" onclick="setPlatform('sp',this)">Spotify</button>
      <button class="pill" onclick="setPlatform('am',this)">Apple Music</button>
      <button class="pill" onclick="setPlatform('yt',this)">YouTube</button>
    </div>
    <input class="search-input" placeholder="Search artists..." oninput="filterArtists(this.value)">
    <div class="day-filters">
      <button class="day-pill active" onclick="setDay(0,this)">All</button>
      <button class="day-pill" onclick="setDay(1,this)">Thu</button>
      <button class="day-pill" onclick="setDay(2,this)">Fri</button>
      <button class="day-pill" onclick="setDay(3,this)">Sat</button>
      <button class="day-pill" onclick="setDay(4,this)">Sun</button>

  </div>
</div>

<div class="hero">
  <div class="hero-left">
    <div class="hero-title">Lolla<br>2026</div>
    <div class="hero-sub">Grant Park, Chicago &nbsp;·&nbsp; July 30 – Aug 2</div>

</div>

<div class="lineup" id="lineup"></div>

let platform = 'sp';
let filterDay = 0;
let filterText = '';

const DAYS = {1:'Thu 7/30',2:'Fri 7/31',3:'Sat 8/1',4:'Sun 8/2'};

function gcFor(g) { return GENRE_CLASS[g] || 'gc-various'; }

function setPlatform(p, btn) {
  platform = p;
  document.querySelectorAll('.pill').forEach(b => b.className = 'pill');
  btn.classList.add('active-' + p);
  render();
}
function setDay(d, btn) {
  filterDay = d;
  document.querySelectorAll('.day-pill').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}
function filterArtists(v) { filterText = v.toLowerCase(); render(); }
function visible(a) {
  if (filterDay > 0 && a.d !== filterDay) return false;
  if (filterText && !a.n.toLowerCase().includes(filterText)) return false;
  return true;
}

function render() {
  const hls = ARTISTS.filter(a => a.t === 'headliner' && visible(a));
  const mjs = ARTISTS.filter(a => a.t === 'major' && visible(a));
  const ucs = ARTISTS.filter(a => a.t === 'undercard' && visible(a));
  const total = hls.length + mjs.length + ucs.length;

  let html = '';

  if (hls.length) {
    html += `<div class="tier-label">Headliners</div><div class="hl-grid">`;
    hls.forEach(a => {
      const gc = gcFor(a.g);
      html += `
        <a class="hl-card ${gc}" href="${a[platform]}" target="_blank" rel="noopener">
          <div class="hl-icon">${ICONS[platform]}</div>
          <div class="hl-name">${a.n}</div>
          <div class="hl-meta">${a.g} &nbsp;·&nbsp; ${DAYS[a.d]}</div>
        </a>`;
    });
    html += `</div>`;
  }

  if (mjs.length) {
    html += `<div class="tier-label">Major Artists</div><div class="mj-grid">`;
    mjs.forEach(a => {
      const gc = gcFor(a.g);
      html += `
        <a class="mj-card ${gc}" href="${a[platform]}" target="_blank" rel="noopener">
          <div class="mj-genre-dot"></div>
          <div class="mj-name">${a.n}</div>
          <div class="mj-meta">${a.g} · ${DAYS[a.d]}</div>
        </a>`;
    });
    html += `</div>`;
  }

  if (ucs.length) {
    html += `<div class="tier-label">Undercard</div><div class="uc-grid">`;
    ucs.forEach(a => {
      const gc = gcFor(a.g);
      html += `
        <a class="uc-card ${gc}" href="${a[platform]}" target="_blank" rel="noopener">
          <div class="uc-dot"></div>
          <div class="uc-name">${a.n}</div>
        </a>`;
    });
    html += `</div>`;
  }

  document.getElementById('lineup').innerHTML = html;
  document.getElementById('resultCount').textContent = `${total} artist${total !== 1 ? 's' : ''}`;
}

render();
</script>
