<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Option C — Clean Stack</title>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --yellow: #FFEE00;
  --magenta: #FF3366;
  --green: #00FF88;
  --indigo: #4400FF;
  --black: #000000;
  --white: #FFFFFF;
  --sp: #1DB954;
  --am: #FC3C44;
  --yt: #FF0000;
  --bg: #070707;
  --surface: #111111;
  --border: rgba(255,255,255,0.07);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--white);
  font-family: 'Space Grotesk', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* GENRE COLOR MAP */
.gc-pop       { --gc: #FF3366; }
.gc-rock      { --gc: #00FF88; }
.gc-edm       { --gc: #9977FF; }
.gc-electronic{ --gc: #7766EE; }
.gc-hiphop    { --gc: #FFEE00; }
.gc-rb        { --gc: #FF8833; }
.gc-indie     { --gc: #BB99FF; }
.gc-kpop      { --gc: #FF66BB; }
.gc-altpop    { --gc: #00CCFF; }
.gc-jpop      { --gc: #FF7755; }
.gc-soulpop   { --gc: #FFB400; }
.gc-country   { --gc: #CCAA55; }
.gc-folk      { --gc: #88CC66; }
.gc-various   { --gc: #888888; }
.gc-classical { --gc: #CCCCCC; }

/* STICKY FILTER BAR */
.controls {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(7,7,7,0.97);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
}
.controls-inner {
  max-width: 700px;
  margin: 0 auto;
  padding: 10px 24px;
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}

.platform-toggle {
  display: flex;
  border: 1px solid var(--border);
  overflow: hidden;
  flex-shrink: 0;
}
.platform-toggle button {
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  letter-spacing: 1px;
  padding: 7px 12px;
  background: transparent;
  border: none;
  color: rgba(255,255,255,0.35);
  cursor: pointer;
  transition: all 0.15s;
  border-right: 1px solid var(--border);
}
.platform-toggle button:last-child { border-right: none; }
.platform-toggle button:hover { color: var(--white); background: rgba(255,255,255,0.05); }
.platform-toggle button.active-sp { color: var(--sp); background: rgba(29,185,84,0.1); }
.platform-toggle button.active-am { color: var(--am); background: rgba(252,60,68,0.1); }
.platform-toggle button.active-yt { color: var(--yt); background: rgba(255,0,0,0.1); }

.search-input {
  flex: 1;
  min-width: 120px;
  background: transparent;
  border: 1px solid var(--border);
  color: var(--white);
  font-family: 'Space Grotesk', sans-serif;
  font-size: 13px;
  padding: 7px 12px;
  outline: none;
  transition: border-color 0.15s;
}
.search-input::placeholder { color: rgba(255,255,255,0.2); }
.search-input:focus { border-color: rgba(255,255,255,0.3); }

.filter-select {
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  letter-spacing: 1px;
  background: transparent;
  border: 1px solid var(--border);
  color: rgba(255,255,255,0.5);
  padding: 7px 12px;
  cursor: pointer;
  outline: none;
  -webkit-appearance: none;
}
.filter-select option { background: #111; color: white; }

.result-pill {
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  letter-spacing: 1px;
  color: rgba(255,255,255,0.25);
  padding: 5px 10px;
  border: 1px solid var(--border);
  white-space: nowrap;
}

/* HERO */
.hero {
  max-width: 700px;
  margin: 0 auto;
  padding: 56px 24px 40px;
  border-bottom: 1px solid var(--border);
}
.hero-eyebrow {
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  letter-spacing: 4px;
  color: rgba(255,255,255,0.25);
  text-transform: uppercase;
  margin-bottom: 16px;
}
.hero-title {
  font-family: 'Anton', sans-serif;
  font-size: clamp(48px, 12vw, 120px);
  background: linear-gradient(135deg, var(--yellow), var(--magenta), var(--green), #A855F7);
  background-size: 300% 300%;
  animation: gr 6s ease infinite;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  line-height: 0.88;
  letter-spacing: -2px;
  text-transform: uppercase;
}
@keyframes gr {
  0%   { background-position: 0% 50%; }
  50%  { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}
.hero-meta {
  display: flex;
  gap: 24px;
  margin-top: 24px;
  flex-wrap: wrap;
}
.hero-stat {
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  letter-spacing: 1px;
  color: rgba(255,255,255,0.3);
}
.hero-stat strong { color: rgba(255,255,255,0.7); font-weight: 700; }

/* LINEUP */
.lineup {
  max-width: 700px;
  margin: 0 auto;
  padding: 0 24px 80px;
}

/* TIER HEADER */
.tier-header {
  font-family: 'Space Mono', monospace;
  font-size: 9px;
  letter-spacing: 5px;
  color: rgba(255,255,255,0.18);
  text-transform: uppercase;
  margin: 48px 0 0;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--border);
}

/* HEADLINER CARDS */
.hl-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-top: 10px;
}
.hl-card {
  display: flex;
  align-items: center;
  padding: 20px 20px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-left: 3px solid var(--gc);
  text-decoration: none;
  transition: all 0.15s;
  gap: 16px;
}
.hl-card:hover {
  border-left-color: var(--gc);
  background: #161616;
  transform: translateX(2px);
}
.hl-main { flex: 1; min-width: 0; }
.hl-name {
  font-family: 'Anton', sans-serif;
  font-size: clamp(24px, 5vw, 40px);
  color: var(--white);
  text-transform: uppercase;
  letter-spacing: -0.5px;
  line-height: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.hl-sub {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-top: 6px;
}
.genre-pill {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  padding: 3px 8px;
  background: color-mix(in srgb, var(--gc) 15%, transparent);
  color: var(--gc);
  border-radius: 2px;
}
.day-label {
  font-family: 'Space Mono', monospace;
  font-size: 9px;
  letter-spacing: 1px;
  color: rgba(255,255,255,0.25);
}
.stream-icon {
  flex-shrink: 0;
  width: 36px;
  height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(255,255,255,0.04);
  border-radius: 50%;
  font-size: 10px;
  letter-spacing: 0;
}

/* MAJOR ROWS */
.mj-list { margin-top: 0; }
.mj-row {
  display: flex;
  align-items: center;
  padding: 13px 0;
  border-bottom: 1px solid var(--border);
  text-decoration: none;
  gap: 12px;
  transition: all 0.12s;
}
.mj-row:hover { background: rgba(255,255,255,0.02); padding-left: 6px; }
.mj-row:hover .mj-name { color: var(--gc); }
.mj-accent {
  width: 3px;
  height: 20px;
  background: var(--gc);
  flex-shrink: 0;
  opacity: 0;
  transition: opacity 0.12s;
}
.mj-row:hover .mj-accent { opacity: 1; }
.mj-name {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 16px;
  font-weight: 600;
  color: rgba(255,255,255,0.85);
  flex: 1;
  transition: color 0.12s;
}
.mj-right {
  display: flex;
  align-items: center;
  gap: 10px;
}
.mj-genre {
  font-family: 'Space Mono', monospace;
  font-size: 9px;
  letter-spacing: 1px;
  color: rgba(255,255,255,0.2);
  text-transform: uppercase;
}
.mj-day {
  font-family: 'Space Mono', monospace;
  font-size: 9px;
  letter-spacing: 1px;
  color: rgba(255,255,255,0.15);
}

/* UNDERCARD GRID */
.uc-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 1px;
  background: var(--border);
  margin-top: 0;
  border: 1px solid var(--border);
}
@media (max-width: 480px) { .uc-grid { grid-template-columns: repeat(2, 1fr); } }
.uc-cell {
  background: var(--bg);
  padding: 10px 12px;
  text-decoration: none;
  display: flex;
  align-items: center;
  gap: 7px;
  transition: background 0.12s;
}
.uc-cell:hover { background: #101010; }
.uc-dot {
  width: 4px;
  height: 4px;
  border-radius: 50%;
  background: var(--gc);
  flex-shrink: 0;
}
.uc-name {
  font-size: 11px;
  font-weight: 500;
  color: rgba(255,255,255,0.5);
  line-height: 1.2;
  transition: color 0.12s;
}
.uc-cell:hover .uc-name { color: rgba(255,255,255,0.8); }

/* OPTION BADGE */
.option-badge {
  position: fixed;
  bottom: 20px;
  right: 20px;
  font-family: 'Anton', sans-serif;
  font-size: 11px;
  letter-spacing: 2px;
  background: var(--yellow);
  color: var(--black);
  padding: 8px 16px;
  z-index: 999;
}
</style>
</head>

  sp: `<svg width="16" height="16" viewBox="0 0 24 24" fill="#1DB954"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/></svg>`,
  am: `<svg width="16" height="16" viewBox="0 0 24 24" fill="#FC3C44"><path d="M23.994 6.124a9.23 9.23 0 00-.24-2.19c-.317-1.31-1.062-2.31-2.18-3.043a5.022 5.022 0 00-1.868-.868 7.8 7.8 0 00-1.564-.24c-.184-.012-.366-.017-.548-.02L6.866 0C3.494 0 1.18 2.33 1.18 5.703c0 .184.005.366.017.548l.01 5.718C1.22 15.298 1.234 18.62 1.25 21.943c.002.184.013.366.027.549.157 1.968 1.4 3.566 3.328 4.23.7.243 1.431.306 2.19.285 1.92-.055 3.851-.016 5.78-.016h6.61c.184 0 .366-.013.548-.027 1.72-.157 3.11-1.033 3.94-2.59.44-.827.633-1.717.633-2.648V6.672a12.36 12.36 0 00-.312-2.548zM8.04 17.3V8.64L16.7 13l-8.66 4.3z"/></svg>`,
  yt: `<svg width="16" height="16" viewBox="0 0 24 24" fill="#FF0000"><path d="M23.495 6.205a3.007 3.007 0 00-2.088-2.088c-1.87-.501-9.396-.501-9.396-.501s-7.507-.01-9.396.501A3.007 3.007 0 00.527 6.205a31.247 31.247 0 00-.522 5.805 31.247 31.247 0 00.522 5.783 3.007 3.007 0 002.088 2.088c1.868.502 9.396.502 9.396.502s7.506 0 9.396-.502a3.007 3.007 0 002.088-2.088 31.247 31.247 0 00.5-5.783 31.247 31.247 0 00-.5-5.805zM9.609 15.601V8.408l6.264 3.602z"/></svg>`
};

function gcFor(g) { return GENRE_CLASS[g] || 'gc-various'; }
function setPlatform(p, btn) {
  platform = p;
  document.querySelectorAll('.platform-toggle button').forEach(b => b.className = '');
  btn.classList.add('active-' + p);
  render();
}
function setDay(d) { filterDay = d; render(); }
function filterArtists(v) { filterText = v.toLowerCase(); render(); }
function visible(a) {
  if (filterDay > 0 && a.d !== filterDay) return false;
  if (filterText && !a.n.toLowerCase().includes(filterText)) return false;
  return true;
}

function render() {
  const hls = ARTISTS.filter(a => a.t === 'headliner' && visible(a));
  const mjs = ARTISTS.filter(a => a.t === 'major' && visible(a));
  const ucs = ARTISTS.filter(a => a.t === 'undercard' && visible(a));
  const total = hls.length + mjs.length + ucs.length;

  let html = '';

  if (hls.length) {
    html += `<div class="tier-header">Headliners</div><div class="hl-list">`;
    hls.forEach(a => {
      const gc = gcFor(a.g);
      html += `
        <a class="hl-card ${gc}" href="${a[platform]}" target="_blank" rel="noopener">
          <div class="hl-main">
            <div class="hl-name">${a.n}</div>
            <div class="hl-sub">
              <span class="genre-pill">${a.g}</span>
              <span class="day-label">${DAYS[a.d]}</span>
            </div>
          </div>
          <div class="stream-icon">${ICONS[platform]}</div>
        </a>`;
    });
    html += `</div>`;
  }

  if (mjs.length) {
    html += `<div class="tier-header" style="margin-top:40px">Major Artists</div><div class="mj-list">`;
    mjs.forEach(a => {
      const gc = gcFor(a.g);
      html += `
        <a class="mj-row ${gc}" href="${a[platform]}" target="_blank" rel="noopener">
          <div class="mj-accent"></div>
          <div class="mj-name">${a.n}</div>
          <div class="mj-right">
            <span class="mj-genre">${a.g}</span>
            <span class="mj-day">${DAYS[a.d]}</span>
          </div>
        </a>`;
    });
    html += `</div>`;
  }

  if (ucs.length) {
    html += `<div class="tier-header" style="margin-top:40px">Undercard</div><div class="uc-grid">`;
    ucs.forEach(a => {
      const gc = gcFor(a.g);
      html += `
        <a class="uc-cell ${gc}" href="${a[platform]}" target="_blank" rel="noopener">
          <div class="uc-dot"></div>
          <div class="uc-name">${a.n}</div>
        </a>`;
    });
    html += `</div>`;
  }

  if (!total) html = `<p style="text-align:center;color:rgba(255,255,255,0.2);padding:60px 0;font-size:13px;letter-spacing:2px">NO ARTISTS MATCH</p>`;

  document.getElementById('lineup').innerHTML = html;
  document.getElementById('resultCount').textContent = `${total} artists`;
}

render();
</script>
</body>
</html>
